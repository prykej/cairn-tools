<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Background -->
  <rect width="32" height="32" rx="4" fill="#F5E6C8"/>
  
  <!-- Crossed hammer and pickaxe -->
  <g transform="translate(16, 16) rotate(-45)">
    <!-- Pickaxe handle -->
    <rect x="-1.5" y="-10" width="3" height="18" fill="#5C4033"/>
    <!-- Pickaxe head left -->
    <path d="M-1.5,-10 L-8,-14 Q-9,-14 -9,-12 L-3,-8 Z" fill="#3D2B1F"/>
    <!-- Pickaxe head right -->
    <path d="M1.5,-10 L8,-14 Q9,-14 9,-12 L3,-8 Z" fill="#3D2B1F"/>
  </g>
  
  <g transform="translate(16, 16) rotate(45)">
    <!-- Hammer handle -->
    <rect x="-1.5" y="-10" width="3" height="18" fill="#5C4033"/>
    <!-- Hammer head -->
    <rect x="-6" y="-12" width="12" height="5" rx="1" fill="#3D2B1F"/>
    <!-- Hammer claw -->
    <path d="M6,-12 L10,-8 L8,-8 L4,-12 Z" fill="#3D2B1F"/>
  </g>
</svg>